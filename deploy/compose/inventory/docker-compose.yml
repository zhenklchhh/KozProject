version: '3.9'
services:
  mongodb:
    image: mongo:7.0.5
    env_file:
      - .env
    volumes:
      - mongodata:/data/db
    ports:
      - 27017:27017
    networks:
      - core-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongodata:

networks:
  core-network:
    name: core-network
    external: true