version: '3.9'

services:
  mongodb:
    image: mongodb/mongodb-community-server:8.0-ubi8
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongodata: /data/db
    ports:
      - 27017:27017
    networks:
      - core-network

volumes:
  mongodata:

networks:
  core-network:
    name: core-network
    external: true