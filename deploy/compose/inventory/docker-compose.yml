version: '3.9'

services:
  mongodb:
    image: mongo:7.0.5
    environment:
      - MONGO_INITDB_ROOT_USERNAME=mongo
      - MONGO_INITDB_ROOT_PASSWORD=password
      - MONGO_INITDB_DATABASE=inventory-db
    volumes:
      - mongodata:/data/db
    ports:
      - 27017:27017
    networks:
      - core-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongodata:

networks:
  core-network:
    name: core-network
    external: true