version: '3'

vars:
  GO_VERSION: '1.26.1'
  GOLANGCI_LINT_VERSION: 'v2.1.5'
  GCI_VERSION: 'v0.13.6'
  GOFUMPT_VERSION: 'v0.8.0'
  BUF_VERSION: '1.53.0'
  PROTOC_GEN_GO_VERSION: 'v1.36.6'
  PROTOC_GEN_GO_GRPC_VERSION: 'v1.5.1'
  OGEN_VERSION: 'v1.10.0'
  YQ_VERSION: 'v4.45.2'
  GRPCURL_VERSION: 'v1.9.3'

  BIN_DIR: '{{.ROOT_DIR | toSlash}}/bin'
  GOLANGCI_LINT: '{{.BIN_DIR}}/golangci-lint.exe'
  GCI: '{{.BIN_DIR}}/gci.exe'
  GOFUMPT: '{{.BIN_DIR}}/gofumpt.exe'
  BUF: '{{.BIN_DIR}}/buf.exe'
  OGEN: '{{.BIN_DIR}}/ogen.exe'
  YQ: '{{.BIN_DIR}}/yq.exe'
  PROTOC_GEN_GO: '{{.BIN_DIR}}/protoc-gen-go.exe'
  PROTOC_GEN_GO_GRPC: '{{.BIN_DIR}}/protoc-gen-go-grpc.exe'
  GRPCURL: '{{.BIN_DIR}}/grpcurl.exe'
  JQ: '{{.BIN_DIR}}/gojq.exe'
  CURL: 'curl'

  NODE_MODULES_DIR: '{{.ROOT_DIR | toSlash}}/node_modules/.bin'
  REDOCLY: '{{.NODE_MODULES_DIR}}/redocly'

  OPEN_API_ORDER_V1_BASE: '{{.ROOT_DIR | toSlash}}/shared/api/order/v1/order.openapi.yaml'
  OPEN_API_ORDER_V1_BUNDLE: '{{.ROOT_DIR | toSlash}}/shared/api/bundles/order.openapi.v1.bundle.yaml'

  OPEN_API_FILES: '{{.ROOT_DIR | toSlash}}/shared/api/bundles'

  MODULES: inventory order payment

tasks:
  install-formatters:
    desc: "Устанавливает форматтеры gci и gofumpt в ./bin"
    cmds:
      - |
        [ -f {{.GOFUMPT}} ] || {
          echo '📦 Устанавливаем gofumpt {{.GOFUMPT_VERSION}}...'
          GOBIN={{.BIN_DIR}} go install mvdan.cc/gofumpt@{{.GOFUMPT_VERSION}}
        }
        [ -f {{.GCI}} ] || {
          echo '📦 Устанавливаем gci {{.GCI_VERSION}}...'
          GOBIN={{.BIN_DIR}} go install github.com/daixiang0/gci@{{.GCI_VERSION}}
        }
    status:
      - test -x {{.GOFUMPT}}
      - test -x {{.GCI}}

  format:
    desc: "Форматирует весь проект gofumpt + gci, исключая mocks"
    deps: [install-formatters]
    cmds:
      - |
        echo "🧼 Форматируем через gofumpt ..."
        for module in {{.MODULES}}; do
          if [ -d "$module" ]; then
            echo "🧼 Форматируем $module"
            {{.GOFUMPT}} -extra -w $module
          fi
        done
      - |
        echo "🎯 Сортируем импорты через gci ..."
        for module in {{.MODULES}}; do
          if [ -d "$module" ]; then
            echo "🎯 Сортируем импорты в $module"
            {{.GCI}} write -s standard -s default -s "prefix(github.com/zhenklchhh/KozProject)" $module
          fi
        done

  install-golangci-lint:
    desc: "Устанавливает golangci-lint в каталог bin"
    cmds:
      - |
        [ -f {{.GOLANGCI_LINT}} ] || {
          mkdir -p {{.BIN_DIR}}
          echo "📦 Устанавливаем golangci-lint {{.GOLANGCI_LINT_VERSION}}..."
          GOBIN={{.BIN_DIR}} go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}}
        }
    status:
      - test -x {{.GOLANGCI_LINT}}

  lint:
    desc: "Запускает golangci-lint для всех модулей"
    deps: [install-golangci-lint]
    cmds:
      - |
        set -e
        ERR=0
        echo "🔍 Линтим все модули ..."
        for mod in {{.MODULES}}; do
          if [ -d "$mod" ]; then
            echo "🔍 Линтим $mod module"
            {{.GOLANGCI_LINT}} run $mod/... --config=$mod/.golangci.yml || ERR=1
          fi
        done
        exit $ERR

  install-buf:
    desc: "Устанавливает Buf в каталог bin"
    status:
      - test -f {{.BUF}}
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - echo "📦 Устанавливаем buf v{{.BUF_VERSION}}..."
      - GOBIN={{.BIN_DIR}} go install github.com/bufbuild/buf/cmd/buf@v{{.BUF_VERSION}}

  proto:install-plugins:
    desc: "Устанавливает protoc плагины в каталог bin"
    cmds:
      - |
        [ -f {{.PROTOC_GEN_GO}} ] || {
          echo '📦 Installing protoc-gen-go...'
          GOBIN={{.BIN_DIR}} go install google.golang.org/protobuf/cmd/protoc-gen-go@{{.PROTOC_GEN_GO_VERSION}}
        }
        [ -f {{.PROTOC_GEN_GO_GRPC}} ] || {
          echo '📦 Installing protoc-gen-go-grpc...'
          GOBIN={{.BIN_DIR}} go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@{{.PROTOC_GEN_GO_GRPC_VERSION}}
        }

  proto:install-deps:
    desc: "Устанавливает зависимости для валидации protobuf"
    dir: shared
    cmds:
      - |
        echo '📦 Устанавливаем зависимости для buf.validate...'
        go get buf.build/gen/go/bufbuild/protovalidate/protocolbuffers/go/buf/validate
        echo '✅ Зависимости для валидации установлены'

  proto:setup:
    desc: "Полная настройка окружения для работы с protobuf (для новых разработчиков)"
    deps: [install-buf, proto:install-plugins]
    cmds:
      - task: proto:install-deps
      - |
        echo '📦 Обновляем buf зависимости...'
        cd shared/proto && {{.BUF}} dep update
        echo '✅ Окружение для protobuf настроено!'

  proto:gen:
    deps: [install-buf, proto:install-plugins, proto:lint]
    desc: Генерация Go-кода из .proto
    dir: shared/proto
    cmds:
      - '{{.BUF}} generate'

  proto:lint:
    deps: [install-buf, proto:install-plugins]
    desc: Проверка .proto-файлов на соответствие стилю
    dir: shared/proto
    cmds:
      - '{{.BUF}} lint'

  redocly-cli:install:
    desc: Установить локально Redocly CLI
    cmds:
      - |
        [ -f {{.REDOCLY}} ] || {
          npm ci
        }

  redocly-cli:order-v1-bundle:
    desc: Собрать OpenAPI в один файл через локальный redocly
    deps: [redocly-cli:install]
    cmds:
      - '{{.REDOCLY}} bundle {{.OPEN_API_ORDER_V1_BASE}} -o {{.OPEN_API_ORDER_V1_BUNDLE}}'

  redocly-cli:bundle:
    desc: Собрать все схемы OpenAPI в общие файлы через локальный redocly
    deps: [redocly-cli:install]
    cmds:
      - task: redocly-cli:order-v1-bundle

  ogen:install:
    desc: "Скачивает ogen в папку bin"
    cmds:
      - |
        [ -f {{.OGEN}} ] || {
          mkdir -p {{.BIN_DIR}}
          GOBIN={{.BIN_DIR}} go install github.com/ogen-go/ogen/cmd/ogen@{{.OGEN_VERSION}}
        }

  ogen:gen:
    desc: "Генерация Go-кода"
    deps: [ogen:install, yq:install]
    cmds:
      - task: redocly-cli:bundle
      - |
        for file in "{{.OPEN_API_FILES}}"/*.yaml "{{.OPEN_API_FILES}}"/*.yml; do
          if [ -f "$file" ]; then
            if grep -q "x-ogen" "$file"; then
              echo "🚀 Generating from: $file"
              TARGET=$("{{.YQ}}" e '."x-ogen".target' "$file")
              PACKAGE=$("{{.YQ}}" e '."x-ogen".package' "$file")
              if [ -z "$TARGET" ] || [ "$TARGET" = "null" ]; then
                echo "⚠️ Skip $file: 'x-ogen.target' not found"
                continue
              fi
              echo "📁 Target: $TARGET"
              echo "📦 Package: $PACKAGE"
              "{{.OGEN}}" --target "$TARGET" --package "$PACKAGE" --clean "$file" || exit 1
            fi
          fi
        done

  gen:
    desc: "Генерация всех proto и OpenAPI деклараций"
    cmds:
      - task: proto:gen
      - task: ogen:gen

  deps:update:
    desc: "Обновление зависимостей в go.mod во всех модулях"
    cmds:
      - |
        echo "🔄 Обновление зависимостей в go.mod во всех модулях"
        for mod in {{.MODULES}}; do
          if [ -d "$mod" ]; then
            echo "🔄 Обновление зависимостей в $mod"
            (cd "$mod" && go mod tidy -compat=1.24) || exit 1
          fi
        done

  yq:install:
    desc: "Устанавливает yq в bin/ при необходимости"
    cmds:
      - |
        [ -f {{.YQ}} ] || {
          echo '📦 Installing yq...'
          GOBIN={{.BIN_DIR}} go install github.com/mikefarah/yq/v4@{{.YQ_VERSION}}
        }

  grpcurl:install:
    desc: "Устанавливает grpcurl"
    status:
      - test -f {{.GRPCURL}}
    cmds:
      - GOBIN={{.BIN_DIR}} go install github.com/fullstorydev/grpcurl/cmd/grpcurl@latest

  jq:install:
    desc: "Устанавливает gojq (реализация jq на Go)"
    status:
      - test -f {{.JQ}}
    cmds:
      - GOBIN={{.BIN_DIR}} go install github.com/itchyny/gojq/cmd/gojq@latest

  test-api:
    desc: "🧪 Запуск тестов для проверки API микросервисов"
    deps: [grpcurl:install, jq:install]
    cmds:
      - |
        echo "🧪 Тестирование API микросервисов"

        echo "📦 Тест 1-2: Получение деталей из Inventory"
        PARTS_RESPONSE=$({{.GRPCURL}} -plaintext -d '{"filter":{}}' localhost:50051 inventory.v1.InventoryService/ListParts)
        PART_UUID=$(echo "$PARTS_RESPONSE" | {{.JQ}} -r '.parts[0].uuid')

        if [ "$PART_UUID" = "null" ] || [ -z "$PART_UUID" ]; then
          echo "❌ Ошибка: Не удалось получить детали из Inventory. Сервис запущен и содержит данные?"
          exit 1
        fi
        echo "✅ UUID детали получен: $PART_UUID"

        echo
        echo "👤 Тест 3: Генерация пользователя"
        USER_UUID="user-$RANDOM"
        echo "✅ Пользователь: $USER_UUID"

        echo
        echo "📝 Тест 4: Создание первого заказа"
        ORDER1_RESP=$({{.CURL}} -s -X POST "http://localhost:8080/api/v1/orders" \
          -H "Content-Type: application/json" \
          -d "{\"user_uuid\":\"$USER_UUID\",\"part_uuids\":[\"$PART_UUID\"]}")
        ORDER1_UUID=$(echo "$ORDER1_RESP" | {{.JQ}} -r '.orderUUID // .order_uuid // .uuid')

        if [ "$ORDER1_UUID" = "null" ] || [ -z "$ORDER1_UUID" ]; then
          echo "❌ Ошибка: Не удалось создать первый заказ. Ответ: $ORDER1_RESP"
          exit 1
        fi
        echo "✅ Заказ 1 создан: $ORDER1_UUID"

        echo
        echo "💰 Тест 6-7: Оплата и проверка статуса"
        {{.CURL}} -s -X POST "http://localhost:8080/api/v1/orders/$ORDER1_UUID/pay" \
          -H "Content-Type: application/json" \
          -d '{"payment_method":"PAYMENT_METHOD_CARD"}' > /dev/null
        sleep 1
        STATUS_PAID=$({{.CURL}} -s "http://localhost:8080/api/v1/orders/$ORDER1_UUID" | {{.JQ}} -r '.status')
        case "$STATUS_PAID" in
          *PAID*)
            echo "✅ Заказ 1 успешно оплачен (статус: $STATUS_PAID)"
            ;;
          *)
            echo "❌ Ошибка оплаты: Ожидали PAID, получили $STATUS_PAID"
            exit 1
            ;;
        esac

        echo
        echo "📝 Тест 8: Создание второго заказа"
        ORDER2_RESP=$({{.CURL}} -s -X POST "http://localhost:8080/api/v1/orders" \
          -H "Content-Type: application/json" \
          -d "{\"user_uuid\":\"$USER_UUID\",\"part_uuids\":[\"$PART_UUID\"]}")
        ORDER2_UUID=$(echo "$ORDER2_RESP" | {{.JQ}} -r '.orderUUID // .order_uuid // .uuid')

        if [ "$ORDER2_UUID" = "null" ] || [ -z "$ORDER2_UUID" ]; then
          echo "❌ Ошибка: Не удалось создать второй заказ. Ответ: $ORDER2_RESP"
          exit 1
        fi
        echo "✅ Заказ 2 создан: $ORDER2_UUID"

        echo
        echo "❌ Тест 9: Отмена второго заказа"
        {{.CURL}} -s -X POST "http://localhost:8080/api/v1/orders/$ORDER2_UUID/cancel" > /dev/null
        sleep 1
        FINAL_INFO=$({{.CURL}} -s "http://localhost:8080/api/v1/orders/$ORDER2_UUID")
        FINAL_STATUS=$(echo "$FINAL_INFO" | {{.JQ}} -r '.status')

        case "$FINAL_STATUS" in
          *CANCELLED*)
            echo "✅ Заказ 2 успешно отменен (статус: $FINAL_STATUS)"
            ;;
          *)
            echo "❌ Ошибка отмены: Ожидали CANCELLED, получили '$FINAL_STATUS'"
            echo "Ответ сервера: $FINAL_INFO"
            exit 1
            ;;
        esac

        echo
        echo "🎉 ВСЕ ТЕСТЫ ПРОЙДЕНЫ!"