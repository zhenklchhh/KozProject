syntax = "proto3";

package payment.v1;

import "buf/validate/validate.proto";

// PaymentService предоставляет API для оплаты заказов
service PaymentService {
    // PayOrder оплачиват заказ и возвращает UUID транзакции оплаты
    rpc PayOrder(PayOrderRequest) returns (PayOrderResponse);
}

// PayOrderRequest предоставляет UUID заказа, пользователя и метод оплаты
message PayOrderRequest {
    string order_uuid = 1 [(buf.validate.field).string.uuid = true];
    string user_uuid = 2 [(buf.validate.field).string.uuid = true];
    PaymentMethod payment_method = 3;
}

// Перечисление методов оплаты
enum PaymentMethod {
    PAYMENT_METHOD_UNSPECIFIED = 0;
    PAYMENT_METHOD_CARD = 1;
    PAYMENT_METHOD_SBP = 2;
    PAYMENT_METHOD_CREDIT_CARD = 3;
    PAYMENT_METHOD_INVESTOR_MONEY = 4;
}

// PayOrderResponse хранит оплаченной UUID транзакции
message PayOrderResponse {
    string transaction_uuid = 1 [(buf.validate.field).string.uuid = true];
}